<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Библиотека Слайдов</title>
    <!-- Подключаем библиотеку Office.js -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1b26; /* Темная тема, как у слайдов */
            color: #ffffff;
            margin: 0;
            padding: 15px;
        }
        h2 {
            font-size: 18px;
            margin-top: 0;
            color: #00d2ff;
            border-bottom: 1px solid #2d3149;
            padding-bottom: 10px;
        }
        .search-box {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #24283b;
            border: 1px solid #414868;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }
        .search-box:focus {
            border-color: #00d2ff;
        }
        .catalog-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .slide-card {
            background-color: #24283b;
            border: 1px solid #414868;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        .slide-card:hover {
            border-color: #00d2ff;
            transform: translateY(-2px);
        }
        .slide-preview {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 1px solid #414868;
        }
        .slide-info {
            padding: 10px;
        }
        .slide-title {
            font-size: 13px;
            font-weight: 600;
            margin: 0 0 5px 0;
            line-height: 1.4;
        }
        .slide-category {
            font-size: 11px;
            color: #a9b1d6;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .insert-btn {
            width: 100%;
            background-color: #00d2ff;
            color: #1a1b26;
            border: none;
            padding: 8px 0;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .insert-btn:hover {
            background-color: #80eaff;
        }
        .loading {
            text-align: center;
            color: #a9b1d6;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>▶ Библиотека Слайдов</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="Поиск слайдов по названию..." />
    <div id="loading" class="loading">Загрузка каталога слайдов...</div>
    <div id="catalog" class="catalog-container" style="display: none;"></div>
    
    <script src="taskpane.js" type="text/javascript"></script>
</body>
</html>
