<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Библиотека Слайдов</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f3f2f1;
            color: #323130;
        }
        
        /* ЛЕВОЕ МЕНЮ (Сайдбар) */
        .sidebar {
            width: 110px; /* Расширили для крупного текста */
            background-color: #ffffff;
            border-right: 1px solid #edebe9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            transition: width 0.3s ease; /* Плавное сворачивание */
        }
        /* Класс для свернутого состояния */
        .sidebar.collapsed {
            width: 60px;
        }
        .sidebar.collapsed .menu-text {
            display: none; /* Прячем текст при сворачивании */
        }

        /* Иконка профиля и кнопка сворачивания */
        .profile-icon {
            font-size: 24px;
            color: #605e5c;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .toggle-btn {
            font-size: 18px;
            color: #0078d4;
            cursor: pointer;
            margin-bottom: 20px;
            padding: 5px;
        }
        .toggle-btn:hover { background-color: #f3f2f1; border-radius: 4px; }

        .menu-item {
            width: 90%;
            padding: 8px 0;
            margin-bottom: 5px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #605e5c;
            box-sizing: border-box;
        }
        .menu-item:hover, .menu-item.active {
            background-color: #f3f2f1;
            color: #0078d4;
        }
        .menu-icon { font-size: 20px; margin-bottom: 4px; }
        .menu-text { 
            font-size: 12px; /* Увеличили шрифт */
            font-weight: 600;
            text-align: center;
        }
        
        /* ПРАВАЯ ЧАСТЬ */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }
        
        /* Вкладки сверху */
        .tabs {
            display: flex;
            border-bottom: 1px solid #edebe9;
            margin-bottom: 15px;
        }
        .tab {
            padding: 5px 15px 10px 15px;
            cursor: pointer;
            font-size: 14px;
            color: #605e5c;
        }
        .tab.active {
            color: #0078d4;
            border-bottom: 2px solid #0078d4;
            font-weight: 600;
        }

        /* Поиск */
        .search-box {
            width: 100%;
            padding: 8px 12px;
            box-sizing: border-box;
            border: 1px solid #8a8886;
            border-radius: 4px;
            margin-bottom: 15px;
            outline: none;
            font-size: 13px;
        }
        
        /* СЕТКА КАРТОЧЕК (Строго 2 колонки) */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 равные колонки */
            gap: 12px;
        }
        .slide-card {
            background-color: #ffffff;
            border: 1px solid #edebe9;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .slide-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .slide-preview {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 1px solid #edebe9;
        }
        
        /* Кнопка плюсик */
        .insert-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: #ffffff;
            border: 1px solid #edebe9;
            color: #0078d4;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .insert-btn:hover { background-color: #f3f2f1; }
        
        /* Инфо о слайде */
        .slide-info {
            padding: 8px;
            padding-right: 40px; /* Отступ чтобы текст не залезал под плюс */
        }
        .slide-title {
            font-size: 11px;
            font-weight: 700;
            margin: 0 0 2px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2; /* Максимум 2 строки */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .slide-category {
            font-size: 9px;
            color: #605e5c;
            margin: 0;
        }

        .loading { font-size: 13px; color: #605e5c; text-align: center; }
    </style>
</head>
<body>
    <!-- Левое меню -->
    <div class="sidebar" id="sidebar">
        <div style="font-size: 16px; font-weight: bold; color: #323130; margin-bottom: 20px;" class="menu-text">Slidebrary</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png" alt="Профиль" style="width: 32px; height: 32px; border-radius: 50%; opacity: 0.7; margin-bottom: 10px; cursor: pointer;">
        <div class="toggle-btn" onclick="toggleSidebar()" title="Свернуть/Развернуть меню" style="font-size: 20px; font-weight: bold;">≡</div>

        <div class="menu-item active" onclick="filterCategory('')">
            <div class="menu-icon">📁</div><span class="menu-text">Все</span>
        </div>
        <div class="menu-item" onclick="filterCategory('Вводные')">
            <div class="menu-icon">📄</div><span class="menu-text">Вводные</span>
        </div>
        <div class="menu-item" onclick="filterCategory('Списки')">
            <div class="menu-icon">📝</div><span class="menu-text">Списки</span>
        </div>
        <!-- Поиск "Диаграммы" найдет и "Диаграммы и аналитика" и "Диаграммы и графики" -->
        <div class="menu-item" onclick="filterCategory('Диаграммы')">
            <div class="menu-icon">📊</div><span class="menu-text">Аналитика</span>
        </div>
        <div class="menu-item" onclick="filterCategory('Инфографика')">
            <div class="menu-icon">💡</div><span class="menu-text">Инфографика</span>
        </div>
        <div class="menu-item" onclick="filterCategory('Процессы')">
            <div class="menu-icon">⏳</div><span class="menu-text">Процессы</span>
        </div>
        <div class="menu-item" onclick="filterCategory('Ресурсы')">
            <div class="menu-icon">🎨</div><span class="menu-text">Ресурсы</span>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        <!-- Вкладки -->
        <div class="tabs">
            <div class="tab active">Публичное</div>
            <div class="tab" onclick="alert('Функция Личного хранилища запланирована в Дорожной карте')">Личное</div>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск слайдов и шаблонов..." />
        
        <div id="loading" class="loading">Загрузка базы из GitHub...</div>
        <div id="catalog" class="catalog-container" style="display: none;"></div>
    </div>
    
    <script src="taskpane.js" type="text/javascript"></script>
</body>
</html>
